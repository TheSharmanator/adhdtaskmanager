<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Recovery</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; 
        }

        /* --- FIXED HEADER --- */
        header {
            background: #000;
            padding: 25px;
            border-bottom: 5px solid white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        h2 { margin: 0; font-size: 2.5rem; text-transform: uppercase; color: #ffd700; }

        .btn-back { 
            background: #444; 
            color: white !important; 
            border: 5px solid white; 
            padding: 20px 40px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-size: 1.8rem; 
            font-weight: 900;
            text-transform: uppercase;
        }

        /* --- CUSTOM SCROLLBAR AREA --- */
        #main-container { display: flex; flex: 1; overflow: hidden; }

        #scroll-area {
            flex: 1; overflow-y: scroll;
            padding: 30px; display: flex; flex-direction: column; align-items: center;
            scrollbar-width: none;
        }
        #scroll-area::-webkit-scrollbar { display: none; }

        #custom-scrollbar {
            width: 120px; background: #1a1a1a;
            border-left: 5px solid white; position: relative; cursor: pointer;
        }

        #scroll-thumb {
            width: 100%; height: 150px; background: #ffd700;
            border-bottom: 5px solid white; border-top: 5px solid white;
            position: absolute; top: 0;
        }

        /* --- TASK CARDS --- */
        .task-card { 
            background: #222; border: 5px solid white; 
            padding: 30px; margin-bottom: 25px; border-radius: 20px;
            display: flex; justify-content: space-between; align-items: center;
            width: 90%; max-width: 800px;
        }

        .info-box strong { font-size: 2.5rem; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .info-box small { font-size: 1.4rem; color: #ffd700; font-weight: bold; text-transform: uppercase; }

        .btn-recover { 
            background: #00ff00; color: black; border: 5px solid white; 
            padding: 25px 50px; border-radius: 15px; 
            cursor: pointer; font-size: 1.8rem; font-weight: 900;
        }

        .btn-recover:active { background: #008800; transform: scale(0.98); }
    </style>
</head>
<body>
    <header>
        <h2>RECENT COMPLETIONS</h2>
        <a href="/" class="btn-back">⬅ CANCEL</a>
    </header>

    <div id="main-container">
        <div id="scroll-area">
            {% for t in tasks %}
            <div class="task-card">
                <div class="info-box">
                    <strong>{{ t.title }}</strong>
                    <small>WAS DUE: {{ t.was_due }}</small>
                </div>
                <form action="/restore/{{ t.id }}" method="POST" autocomplete="off">
                    <button type="submit" class="btn-recover">RECOVER</button>
                </form>
            </div>
            {% endfor %}
        </div>

        <div id="custom-scrollbar" onmousedown="startScroll(event)" ontouchstart="startScroll(event)">
            <div id="scroll-thumb"></div>
        </div>
    </div>

    <script>
        const scrollArea = document.getElementById('scroll-area');
        const thumb = document.getElementById('scroll-thumb');
        const track = document.getElementById('custom-scrollbar');

        scrollArea.addEventListener('scroll', () => {
            const scrollPercent = scrollArea.scrollTop / (scrollArea.scrollHeight - scrollArea.clientHeight);
            const thumbPos = scrollPercent * (track.clientHeight - thumb.clientHeight);
            thumb.style.top = thumbPos + 'px';
        });

        function startScroll(e) {
            const moveHandler = (moveEvent) => {
                const y = (moveEvent.touches ? moveEvent.touches[0].clientY : moveEvent.clientY) - track.getBoundingClientRect().top;
                const percent = Math.max(0, Math.min(1, y / track.clientHeight));
                scrollArea.scrollTop = percent * (scrollArea.scrollHeight - scrollArea.clientHeight);
            };
            const stopHandler = () => {
                window.removeEventListener('mousemove', moveHandler);
                window.removeEventListener('mouseup', stopHandler);
                window.removeEventListener('touchmove', moveHandler);
                window.removeEventListener('touchend', stopHandler);
            };
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('mouseup', stopHandler);
            window.addEventListener('touchmove', moveHandler, { passive: false });
            window.addEventListener('touchend', stopHandler);
        }
    </script>
</body>
</html>
