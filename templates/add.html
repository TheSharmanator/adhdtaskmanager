<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Add Task</title>
    <link rel="stylesheet" href="/static/js/simple-keyboard.css">
    <style>
        body {
            background: #121212; color: white; font-family: sans-serif;
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden;
        }

        header {
            background: #000; padding: 10px 15px; border-bottom: 4px solid white;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        .header-left, .header-right { display: flex; gap: 8px; flex: 1; }
        .header-right { justify-content: flex-end; }

        .tab {
            padding: 10px 16px; background: #333; cursor: pointer; border: 3px solid #555;
            font-weight: 900; font-size: 0.85rem; border-radius: 8px; color: #888;
        }
        .active-tab { background: #0066ff; border-color: white; color: white; }

        .btn-header {
            padding: 10px 14px; border: 3px solid white; border-radius: 8px;
            font-weight: 900; font-size: 0.8rem; text-decoration: none; text-transform: uppercase;
            cursor: pointer; display: flex; align-items: center;
        }
        .btn-save { background: #00ff00; color: black; }
        .btn-cancel { background: #444; color: white; }

        #main-container { display: flex; flex: 1; overflow: hidden; }
        #scroll-area { width: calc(100% - 100px); overflow-y: scroll; padding: 20px; padding-bottom: 400px; scrollbar-width: none; -ms-overflow-style: none; }
        #scroll-area::-webkit-scrollbar { display: none; }
        #custom-scrollbar { width: 100px; background: #1a1a1a; border-left: 5px solid white; position: relative; cursor: pointer; flex-shrink: 0; }
        #scroll-thumb { width: 100%; height: 120px; background: #ffd700; border-bottom: 5px solid white; border-top: 5px solid white; position: absolute; top: 0; }

        form { width: 100%; max-width: 950px; margin: 0 auto; }
        label { font-size: 1.0rem; font-weight: bold; color: #ffd700; display: block; margin-top: 15px; text-transform: uppercase; }

        input[type="text"], input[type="number"] {
            width: 100%; padding: 16px; margin: 5px 0; background: #222;
            color: white; border: 3px solid white; font-size: 1.4rem;
            font-weight: 900; border-radius: 10px; box-sizing: border-box;
        }

        .side-by-side { display: flex; gap: 20px; width: 100%; align-items: flex-end; }
        .side-by-side > div { flex: 1; }

        /* Deadline Type Buttons */
        .dl-type-row { display: flex; gap: 15px; margin: 10px 0; }
        .dl-btn {
            flex: 1; padding: 20px 10px; background: #222; color: #888;
            border: 4px solid #444; border-radius: 14px; font-size: 1.1rem;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            text-align: center; line-height: 1.3;
        }
        .dl-btn.active { background: #003399; border-color: #ffd700; color: white; }
        .dl-btn.active-fixed { background: #880000; border-color: #ff4444; color: white; }
        .dl-btn.active-flexible { background: #004400; border-color: #00ff00; color: white; }
        .dl-btn small { display: block; font-size: 0.7rem; font-weight: normal; color: inherit; opacity: 0.8; margin-top: 4px; }

        /* Duration + AI Estimate row */
        .ai-btn {
            width: 100%; padding: 16px; background: #0066ff; color: white;
            border: 3px solid #4488ff; border-radius: 10px; font-size: 1.1rem;
            font-weight: 900; cursor: pointer; text-transform: uppercase;
            text-align: center;
        }
        .ai-btn:disabled { background: #333; border-color: #555; color: #666; cursor: not-allowed; }

        #estimate-info {
            margin: 6px 0; padding: 10px 14px; background: #1a1a1a;
            border: 2px solid #333; border-radius: 8px; font-size: 0.85rem;
            color: #888; display: none;
        }

        /* Complex toggle */
        .complex-toggle {
            width: 100%; padding: 22px; margin-top: 20px;
            background: #111; border: 4px solid #555; border-radius: 14px;
            font-size: 1.2rem; font-weight: 900; cursor: pointer;
            text-transform: uppercase; color: #888; text-align: center;
        }
        .complex-toggle.active { background: #1a0a00; border-color: #ff8800; color: #ff8800; }

        /* Interval */
        .interval-container { display: flex; gap: 15px; margin: 10px 0; height: 100px; }
        .interval-container input { display: none; }
        .interval-container label {
            flex: 1; padding: 0; background: #333; color: white; border: 4px solid white;
            font-size: 1.8rem; font-weight: 900; border-radius: 12px; cursor: pointer;
            display: flex; align-items: center; justify-content: center; margin-top: 0;
        }
        .interval-container input:checked + label { background: #0066ff; border-color: #ffd700; }

        /* Keyboard */
        .simple-keyboard { width: 100%; background-color: #000 !important; border-top: 3px solid #333; }
        .hg-button { height: 55px !important; font-size: 1.25rem !important; font-weight: 900 !important; background: #1a1a1a !important; color: #fff !important; border: 2px solid #333 !important; border-radius: 8px !important; box-shadow: none !important; }
        .hg-button:active { background: #ffd700 !important; color: #000 !important; }
        .hg-button-enter { background: #00ff00 !important; color: #000 !important; }
        .hg-button-backspace { background: #ff0055 !important; color: #fff !important; }

        /* Picker styles */
        .p-btn {
            background: #222; color: white; border: 3px solid white;
            font-size: 1.5rem; font-weight: 900; padding: 15px;
            border-radius: 12px; cursor: pointer;
            display: flex; justify-content: center; align-items: center;
        }
        .p-btn:active, .p-btn.active { background: #ffd700; color: black; border-color: #ffd700; }
        #month-step .p-btn { padding: 10px; font-size: 1.2rem; }

        /* Hide number spinner arrows — numpad popup is used instead */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; appearance: textfield; }

        @media (max-width: 600px) {
            .dl-type-row { flex-direction: column; }
            .side-by-side { flex-direction: column; align-items: stretch; gap: 0; }
            #custom-scrollbar { display: none; }
            #scroll-area { overflow-y: auto; height: 100%; padding-bottom: 100px; width: 100%; }
            .simple-keyboard { display: none !important; }
        }
    </style>
    <script src="/static/js/scale.js"></script>
</head>
<body>
    <header>
        <div class="header-left">
            <div id="tab-one" class="tab active-tab" onclick="switchTab('one-off')">1-OFF</div>
            <div id="tab-recur" class="tab" onclick="switchTab('recurring')">RECURRING</div>
        </div>
        <div class="header-right">
            <button type="button" class="btn-header btn-save" onclick="validateAndSubmit()">SAVE</button>
            <a href="/" class="btn-header btn-cancel">CANCEL</a>
        </div>
    </header>

    <div id="main-container">
        <div id="scroll-area">
            <form id="task-form" method="POST" action="/add" autocomplete="off">
                <input type="hidden" name="type" id="task-type" value="one-off">
                <input type="hidden" name="deadline_type" id="deadline_type_val" value="">
                <input type="hidden" name="is_complex" id="is_complex_val" value="0">

                <label>TASK NAME:</label>
                <input type="text" name="title" class="input" placeholder="TASK..." required>

                <!-- RECURRING INTERVAL (hidden by default) -->
                <div id="interval-wrapper" style="display: none; width: 100%; margin-top: 20px;">
                    <label>INTERVAL:</label>
                    <div class="interval-container" style="display: grid; grid-template-columns: repeat(9, 1fr); gap: 15px;">
                        <input type="radio" id="unit-d" name="interval_unit" value="D" checked onclick="updateInterval()">
                        <label for="unit-d">D</label>
                        <input type="radio" id="unit-w" name="interval_unit" value="W" onclick="updateInterval()">
                        <label for="unit-w">W</label>
                        <input type="radio" id="unit-m" name="interval_unit" value="M" onclick="updateInterval()">
                        <label for="unit-m">M</label>
                        <input type="radio" id="num-1" name="interval_count" value="1" checked onclick="updateInterval()">
                        <label for="num-1">1</label>
                        <input type="radio" id="num-2" name="interval_count" value="2" onclick="updateInterval()">
                        <label for="num-2">2</label>
                        <input type="radio" id="num-3" name="interval_count" value="3" onclick="updateInterval()">
                        <label for="num-3">3</label>
                        <input type="radio" id="num-4" name="interval_count" value="4" onclick="updateInterval()">
                        <label for="num-4">4</label>
                        <input type="radio" id="num-5" name="interval_count" value="5" onclick="updateInterval()">
                        <label for="num-5">5</label>
                        <input type="radio" id="num-6" name="interval_count" value="6" onclick="updateInterval()">
                        <label for="num-6">6</label>
                    </div>
                    <input type="hidden" name="interval" id="combined-interval" value="1D">
                </div>

                <!-- ONE-OFF FIELDS -->
                <div id="one-off-fields">
                    <label>DEADLINE TYPE:</label>
                    <div class="dl-type-row">
                        <button type="button" class="dl-btn" id="btn-fixed" onclick="setDeadlineType('fixed', this)">
                            FIXED<small>Hard deadline</small>
                        </button>
                        <button type="button" class="dl-btn" id="btn-flexible" onclick="setDeadlineType('flexible', this)">
                            FLEXIBLE<small>Casual date</small>
                        </button>
                        <button type="button" class="dl-btn" id="btn-none" onclick="setDeadlineType('none', this)">
                            NO DEADLINE<small>Backlog</small>
                        </button>
                    </div>

                    <div id="date-time-wrapper">
                        <div class="side-by-side">
                            <div>
                                <label>DATE (DD/MM/YYYY):</label>
                                <input type="text" name="deadline_date" class="input mask-date" placeholder="DD/MM/YYYY" maxlength="10">
                            </div>
                            <div>
                                <label>TIME (HH:MM):</label>
                                <input type="text" name="deadline_time" class="input mask-time" placeholder="HH:MM" maxlength="5">
                            </div>
                        </div>
                    </div>

                    <!-- DURATION + AI ESTIMATE -->
                    <div class="side-by-side" style="align-items: flex-end; margin-top: 5px;">
                        <div style="flex: 2;">
                            <label>DURATION (MINUTES):</label>
                            <input type="number" name="duration_minutes" id="duration_minutes" class="input" placeholder="30" min="5" max="960" step="5">
                        </div>
                        <div style="flex: 1;">
                            <button type="button" id="ai-estimate-btn" onclick="estimateDuration()" class="ai-btn">AI ESTIMATE</button>
                        </div>
                    </div>
                    <div id="estimate-info"></div>

                    <!-- COMPLEX TASK TOGGLE -->
                    <button type="button" id="complex-toggle" class="complex-toggle" onclick="toggleComplex()">
                        COMPLEX TASK — BREAK IT DOWN WITH AI
                    </button>
                    <div id="complex-hint" style="display:none; padding: 10px; background: #1a0a00; border: 2px solid #ff8800; border-radius: 8px; margin-top: 8px; font-size: 0.9rem; color: #ff8800;">
                        After saving, AI will ask you a few questions to break this into manageable steps.
                    </div>
                </div>

                <!-- RECURRING FIELDS -->
                <div id="recurring-fields" style="display:none;">
                    <div class="side-by-side">
                        <div>
                            <label>START DATE:</label>
                            <input type="text" name="recur_start_date" class="input mask-date" placeholder="DD/MM/YYYY" maxlength="10">
                        </div>
                        <div>
                            <label>APPEAR TIME:</label>
                            <input type="text" name="recur_time" class="input mask-time" placeholder="HH:MM" maxlength="5">
                        </div>
                    </div>

                    <div class="side-by-side" style="align-items: flex-end; margin-top: 5px;">
                        <div style="flex: 2;">
                            <label>DURATION (MINUTES):</label>
                            <input type="number" name="duration_minutes_recur" class="input" placeholder="30" min="5" max="960" step="5">
                        </div>
                        <div style="flex: 1;">
                            <button type="button" onclick="estimateDuration()" class="ai-btn">AI ESTIMATE</button>
                        </div>
                    </div>

                    <div class="side-by-side" style="margin-top:10px;">
                        <div>
                            <label>END DATE <span style="color:#888; font-size:0.7em;">(OPTIONAL)</span>:</label>
                            <input type="text" name="recur_end_date" class="input mask-date" placeholder="DD/MM/YYYY" maxlength="10">
                        </div>
                        <div>
                            <!-- spacer to keep layout aligned -->
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div id="custom-scrollbar" onmousedown="startScroll(event)" ontouchstart="startScroll(event)">
            <div id="scroll-thumb"></div>
        </div>
    </div>

    <!-- TOUCH CALENDAR WIZARD -->
    <div id="touch-picker" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:#111; border:5px solid #ffd700; border-radius:20px; padding:30px; width:95%; max-width:850px; box-sizing:border-box;">
            <h2 id="picker-title" style="text-align:center; color:#ffd700; margin-top:0; font-size:2rem; text-transform:uppercase;">SELECT YEAR</h2>
            <div id="picker-shortcuts" style="display:flex; flex-wrap:wrap; gap:8px; margin-bottom:15px; justify-content:center;"></div>
            <div id="year-step" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;"></div>
            <div id="month-step" style="display:none; grid-template-columns: repeat(6, 1fr); gap:10px;">
                <button class="p-btn" onclick="selectMonth(0)">JAN</button>
                <button class="p-btn" onclick="selectMonth(1)">FEB</button>
                <button class="p-btn" onclick="selectMonth(2)">MAR</button>
                <button class="p-btn" onclick="selectMonth(3)">APR</button>
                <button class="p-btn" onclick="selectMonth(4)">MAY</button>
                <button class="p-btn" onclick="selectMonth(5)">JUN</button>
                <button class="p-btn" onclick="selectMonth(6)">JUL</button>
                <button class="p-btn" onclick="selectMonth(7)">AUG</button>
                <button class="p-btn" onclick="selectMonth(8)">SEP</button>
                <button class="p-btn" onclick="selectMonth(9)">OCT</button>
                <button class="p-btn" onclick="selectMonth(10)">NOV</button>
                <button class="p-btn" onclick="selectMonth(11)">DEC</button>
            </div>
            <div id="day-step" style="display:none;">
                <div style="display:grid; grid-template-columns: repeat(7, 1fr); gap:5px; text-align:center; color:#888; font-weight:bold; margin-bottom:10px; font-size:1.2rem;">
                    <div>M</div><div>T</div><div>W</div><div>T</div><div>F</div><div>S</div><div>S</div>
                </div>
                <div id="days-grid" style="display:grid; grid-template-columns: repeat(7, 1fr); gap:10px;"></div>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:20px; gap:10px;">
                <button type="button" onclick="document.getElementById('touch-picker').style.display='none'" style="flex:1; padding:20px; font-size:1.5rem; font-weight:900; background:#ff0055; color:white; border-radius:12px; border:3px solid white; cursor:pointer;">CANCEL</button>
                <button type="button" onclick="resetPicker()" style="flex:1; padding:20px; font-size:1.5rem; font-weight:900; background:#444; color:white; border-radius:12px; border:3px solid #555; cursor:pointer;">RESET</button>
                <button type="button" id="picker-ok" onclick="confirmDate()" style="flex:1; display:none; padding:20px; font-size:1.5rem; font-weight:900; background:#00ff00; color:black; border-radius:12px; border:3px solid white; cursor:pointer;">OK</button>
            </div>
        </div>
    </div>

    <!-- TOUCH CLOCK PICKER -->
    <div id="clock-picker" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:#111; border:5px solid #ffd700; border-radius:20px; padding:20px; width:90%; max-width:300px; box-sizing:border-box; text-align:center;">
            <h2 style="color:#ffd700; margin-top:0; font-size:2rem;">SELECT TIME</h2>
            <div id="clock-digital" style="background:#222; border:3px solid white; padding:10px; font-size:1.8rem; font-weight:900; margin-bottom:15px; border-radius:10px; color:white; display:inline-block; width:120px;">12:00</div>
            <div id="clock-face" style="width:240px; height:240px; border:6px solid white; border-radius:50%; margin:0 auto; position:relative; background:#1a1a1a; touch-action:none;">
                <div style="width:16px; height:16px; background:white; border-radius:50%; position:absolute; top:112px; left:112px; z-index:10;"></div>
                <div id="hour-hand" style="width:18px; height:60px; background:#ffd700; position:absolute; top:52px; left:111px; transform-origin: bottom center; transform: rotate(0deg); border-radius: 8px; z-index: 5;"></div>
                <div id="minute-hand" style="width:16px; height:90px; background:#00ff00; position:absolute; top:22px; left:112px; transform-origin: bottom center; transform: rotate(0deg); border-radius: 4px; z-index: 4;"></div>
            </div>
            <div style="display:flex; justify-content:center; gap:20px; margin-top:15px;">
                <button type="button" id="toggle-am" class="p-btn active" onclick="setAMPM('AM')">AM</button>
                <button type="button" id="toggle-pm" class="p-btn" onclick="setAMPM('PM')">PM</button>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:20px; gap:10px;">
                <button onclick="closeClock()" style="flex:1; padding:15px; font-size:1.2rem; font-weight:900; background:#444; color:white; border-radius:10px; border:2px solid #555; cursor:pointer;">CANCEL</button>
                <button onclick="confirmTime()" style="flex:1; padding:15px; font-size:1.2rem; font-weight:900; background:#00ff00; color:black; border-radius:10px; border:2px solid white; cursor:pointer;">OK</button>
            </div>
        </div>
    </div>

    <!-- KEYBOARD -->
    <div id="keyboard-container" style="position: fixed; bottom: 0; left: 0; width: 100%; z-index: 1000; display: none;">
        <div id="keyboard-preview" style="background: #222; color: white; padding: 10px; font-size: 1.5rem; text-align: center; border-bottom: 2px solid #ffd700;">Typing...</div>
        <div class="simple-keyboard"></div>
    </div>

    <script src="/static/js/simple-keyboard.js"></script>

    <script>
        const isMobile = {{ 'true' if is_mobile else 'false' }};

        if (isMobile) {
            document.querySelectorAll('.mask-date').forEach(input => input.type = 'date');
            document.querySelectorAll('.mask-time').forEach(input => input.type = 'time');
        }

        // --- DEADLINE TYPE ---
        function setDeadlineType(type, btn) {
            document.getElementById('deadline_type_val').value = type;
            document.querySelectorAll('.dl-btn').forEach(b => {
                b.classList.remove('active', 'active-fixed', 'active-flexible');
            });
            if (type === 'fixed') btn.classList.add('active-fixed');
            else if (type === 'flexible') btn.classList.add('active-flexible');
            else btn.classList.add('active');

            document.getElementById('date-time-wrapper').style.display = (type === 'none') ? 'none' : 'block';
        }

        // --- COMPLEX TOGGLE ---
        function toggleComplex() {
            const btn = document.getElementById('complex-toggle');
            const hint = document.getElementById('complex-hint');
            const val = document.getElementById('is_complex_val');
            const isActive = btn.classList.contains('active');
            btn.classList.toggle('active', !isActive);
            hint.style.display = isActive ? 'none' : 'block';
            val.value = isActive ? '0' : '1';
        }

        // --- AI DURATION ESTIMATE ---
        function estimateDuration() {
            const title = document.querySelector('[name="title"]').value.trim();
            if (!title) { showError("Enter a task name first."); return; }

            const btn = document.getElementById('ai-estimate-btn');
            const info = document.getElementById('estimate-info');
            btn.innerText = 'THINKING...';
            btn.disabled = true;
            info.style.display = 'none';

            fetch('/api/estimate_duration', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title})
            })
            .then(r => r.json())
            .then(d => {
                if (d.buffered_minutes) {
                    document.getElementById('duration_minutes').value = d.buffered_minutes;
                    info.innerText = `AI: ${d.raw_minutes}min + buffer = ${d.buffered_minutes}min  —  ${d.rationale}`;
                    info.style.display = 'block';
                } else {
                    info.innerText = d.error || 'AI estimate unavailable — enter manually.';
                    info.style.display = 'block';
                }
            })
            .catch(() => {
                info.innerText = 'Could not reach AI — enter duration manually.';
                info.style.display = 'block';
            })
            .finally(() => {
                btn.innerText = 'AI ESTIMATE';
                btn.disabled = false;
            });
        }

        // --- PICKER LOGIC ---
        let activePickerInput = null;
        let selectedYear = null;
        let selectedMonth = null;
        let selectedDay = null;

        function openPicker(inputEl) {
            if (isMobile) return;
            activePickerInput = inputEl;
            resetPicker();
            document.getElementById('touch-picker').style.display = 'flex';
        }

        function buildYearButtons() {
            const yr = new Date().getFullYear();
            const el = document.getElementById('year-step');
            el.innerHTML = '';
            for (let y = yr; y <= yr + 2; y++) {
                const b = document.createElement('button');
                b.className = 'p-btn'; b.textContent = y;
                b.onclick = () => selectYear(y);
                el.appendChild(b);
            }
        }
        buildYearButtons();

        function buildPickerShortcuts() {
            const DAY_NAMES = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
            const today = new Date();
            const el = document.getElementById('picker-shortcuts');
            el.innerHTML = '';
            const shortcuts = [{ label: 'TODAY', offset: 0 }, { label: 'TOMORROW', offset: 1 }];
            for (let i = 2; i <= 6; i++) {
                const d = new Date(today); d.setDate(today.getDate() + i);
                shortcuts.push({ label: DAY_NAMES[d.getDay()], offset: i });
            }
            shortcuts.forEach(sc => {
                const d = new Date(today); d.setDate(today.getDate() + sc.offset);
                const b = document.createElement('button');
                b.type = 'button';
                b.className = 'p-btn';
                b.style.cssText = 'background:#1a3a00; color:#ffd700; border-color:#ffd700; font-size:1rem; padding:10px 14px;';
                b.textContent = sc.label;
                b.onclick = () => selectShortcutDate(d);
                el.appendChild(b);
            });
        }
        buildPickerShortcuts();

        function selectShortcutDate(date) {
            if (!activePickerInput) return;
            const dd = String(date.getDate()).padStart(2, '0');
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            activePickerInput.value = `${dd}/${mm}/${date.getFullYear()}`;
            activePickerInput.dispatchEvent(new Event('input', { bubbles: true }));
            document.getElementById('touch-picker').style.display = 'none';
        }

        function resetPicker() {
            selectedYear = null; selectedMonth = null; selectedDay = null;
            document.getElementById('picker-title').innerText = "SELECT YEAR";
            document.getElementById('year-step').style.display = 'grid';
            document.getElementById('month-step').style.display = 'none';
            document.getElementById('day-step').style.display = 'none';
            document.getElementById('picker-ok').style.display = 'none';
        }

        function selectYear(year) {
            selectedYear = year;
            document.getElementById('picker-title').innerText = "SELECT MONTH";
            document.getElementById('year-step').style.display = 'none';
            document.getElementById('month-step').style.display = 'grid';
        }

        function selectMonth(month) {
            selectedMonth = month;
            document.getElementById('picker-title').innerText = "SELECT DAY";
            document.getElementById('month-step').style.display = 'none';
            document.getElementById('day-step').style.display = 'block';
            generateDaysGrid(selectedYear, selectedMonth);
        }

        function generateDaysGrid(year, month) {
            const grid = document.getElementById('days-grid');
            grid.innerHTML = '';
            const firstDay = new Date(year, month, 1).getDay();
            const startOffset = (firstDay === 0) ? 6 : firstDay - 1;
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 0; i < startOffset; i++) grid.appendChild(document.createElement('div'));
            for (let day = 1; day <= daysInMonth; day++) {
                const btn = document.createElement('button');
                btn.innerText = day;
                btn.className = 'p-btn';
                btn.onclick = () => selectDay(day, btn);
                grid.appendChild(btn);
            }
        }

        function selectDay(day, btn) {
            selectedDay = day;
            document.querySelectorAll('#days-grid .p-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('picker-ok').style.display = 'block';
        }

        function confirmDate() {
            if (!activePickerInput) return;
            activePickerInput.value = `${String(selectedDay).padStart(2,'0')}/${String(selectedMonth+1).padStart(2,'0')}/${selectedYear}`;
            activePickerInput.dispatchEvent(new Event('input', { bubbles: true }));
            document.getElementById('touch-picker').style.display = 'none';
        }

        if (!isMobile) {
            document.querySelectorAll('.mask-date').forEach(input => {
                input.addEventListener('click', e => openPicker(e.target));
            });
            document.querySelectorAll('.mask-time').forEach(input => {
                input.addEventListener('click', e => openClockPicker(e.target));
            });
        }

        // --- CLOCK PICKER ---
        let activeClockInput = null;
        let currentHour = 9;
        let currentMinute = 0;
        let activeHand = null;
        let currentAMPM = 'AM';

        function setAMPM(val) {
            currentAMPM = val;
            document.getElementById('toggle-am').classList.toggle('active', val === 'AM');
            document.getElementById('toggle-pm').classList.toggle('active', val === 'PM');
            updateClockDisplay();
        }

        const face = document.getElementById('clock-face');
        for (let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.innerText = i;
            num.style.position = 'absolute';
            num.style.color = 'white';
            num.style.fontWeight = '900';
            num.style.fontSize = '1.4rem';
            const angle = i * 30 * (Math.PI / 180);
            const x = 120 + 90 * Math.sin(angle) - 10;
            const y = 120 - 90 * Math.cos(angle) - 15;
            num.style.left = `${x}px`;
            num.style.top = `${y}px`;
            face.appendChild(num);
        }

        function openClockPicker(inputEl) {
            if (isMobile) return;
            activeClockInput = inputEl;
            document.getElementById('clock-picker').style.display = 'flex';
            updateClockDisplay();
        }

        function closeClock() {
            document.getElementById('clock-picker').style.display = 'none';
            activeHand = null;
        }

        function confirmTime() {
            if (!activeClockInput) return;
            let displayHour = currentHour;
            if (currentAMPM === 'PM' && currentHour < 12) displayHour += 12;
            else if (currentAMPM === 'AM' && currentHour === 12) displayHour = 0;
            activeClockInput.value = `${String(displayHour).padStart(2,'0')}:${String(currentMinute).padStart(2,'0')}`;
            activeClockInput.dispatchEvent(new Event('input', { bubbles: true }));
            closeClock();
        }

        function updateClockDisplay() {
            let displayHour = currentHour;
            if (currentAMPM === 'PM' && currentHour < 12) displayHour += 12;
            else if (currentAMPM === 'AM' && currentHour === 12) displayHour = 0;
            document.getElementById('clock-digital').innerText = `${String(displayHour).padStart(2,'0')}:${String(currentMinute).padStart(2,'0')}`;
            document.getElementById('hour-hand').style.transform = `rotate(${(currentHour % 12) * 30}deg)`;
            document.getElementById('minute-hand').style.transform = `rotate(${currentMinute * 6}deg)`;
        }

        function handleClockMove(e) {
            if (!activeHand) return;
            const rect = face.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            let angle = Math.atan2(clientY - cy, clientX - cx) * (180 / Math.PI) + 90;
            if (angle < 0) angle += 360;
            if (activeHand === 'hour') {
                let h = Math.round(angle / 30);
                currentHour = (h === 0 || h > 12) ? 12 : h;
            } else {
                let m = Math.round(angle / 6);
                m = Math.round(m / 5) * 5;
                currentMinute = (m === 60) ? 0 : m;
            }
            updateClockDisplay();
        }

        function startClockDrag(e) {
            const rect = face.getBoundingClientRect();
            const cx = rect.left + rect.width / 2;
            const cy = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const dist = Math.sqrt((clientX-cx)**2 + (clientY-cy)**2);
            activeHand = (dist < 75) ? 'hour' : 'minute';
            handleClockMove(e);
        }

        face.addEventListener('mousedown', startClockDrag);
        face.addEventListener('touchstart', (e) => { e.preventDefault(); startClockDrag(e); }, { passive: false });
        window.addEventListener('mousemove', handleClockMove);
        window.addEventListener('touchmove', handleClockMove, { passive: false });
        window.addEventListener('mouseup', () => activeHand = null);
        window.addEventListener('touchend', () => activeHand = null);

        // --- INTERVAL ---
        function updateInterval() {
            const unit = document.querySelector('input[name="interval_unit"]:checked').value;
            const count = document.querySelector('input[name="interval_count"]:checked').value;
            document.getElementById('combined-interval').value = count + unit;
        }

        // --- TAB SWITCHING ---
        function switchTab(type) {
            const isRecur = type === 'recurring';
            document.getElementById('task-type').value = type;
            document.getElementById('tab-one').classList.toggle('active-tab', !isRecur);
            document.getElementById('tab-recur').classList.toggle('active-tab', isRecur);
            document.getElementById('one-off-fields').style.display = isRecur ? 'none' : 'block';
            document.getElementById('recurring-fields').style.display = isRecur ? 'block' : 'none';
            document.getElementById('interval-wrapper').style.display = isRecur ? 'block' : 'none';
        }

        // --- SCROLLBAR ---
        const scrollArea = document.getElementById('scroll-area');
        const thumb = document.getElementById('scroll-thumb');
        const track = document.getElementById('custom-scrollbar');

        if (!isMobile) {
            scrollArea.addEventListener('scroll', () => {
                const pct = scrollArea.scrollTop / (scrollArea.scrollHeight - scrollArea.clientHeight);
                thumb.style.top = (pct * (track.clientHeight - thumb.clientHeight)) + 'px';
            });
        }

        function startScroll(e) {
            const move = (ev) => {
                const y = (ev.touches ? ev.touches[0].clientY : ev.clientY) - track.getBoundingClientRect().top;
                const pct = Math.max(0, Math.min(1, y / track.clientHeight));
                scrollArea.scrollTop = pct * (scrollArea.scrollHeight - scrollArea.clientHeight);
            };
            const stop = () => {
                window.removeEventListener('mousemove', move);
                window.removeEventListener('mouseup', stop);
                window.removeEventListener('touchmove', move);
                window.removeEventListener('touchend', stop);
            };
            window.addEventListener('mousemove', move);
            window.addEventListener('mouseup', stop);
            window.addEventListener('touchmove', move, { passive: false });
            window.addEventListener('touchend', stop);
        }

        // --- KEYBOARD ---
        if (!isMobile) {
            let selectedInputName = "title";
            let myKeyboard = new window.SimpleKeyboard.default({
                onChange: input => {
                    let el = document.querySelector(`[name="${selectedInputName}"]`);
                    if (el) {
                        el.value = input;
                        el.dispatchEvent(new Event('input', { bubbles: true }));
                    }
                    document.getElementById('keyboard-preview').innerText = input || "Typing...";
                },
                onKeyPress: button => {
                    if (button === "{enter}") {
                        document.getElementById("keyboard-container").style.display = "none";
                    } else if (button === "{clear}") {
                        myKeyboard.setInput("");
                        let el = document.querySelector(`[name="${selectedInputName}"]`);
                        if (el) { el.value = ""; el.dispatchEvent(new Event('input', { bubbles: true })); }
                        document.getElementById('keyboard-preview').innerText = "Typing...";
                    }
                },
                preventMouseDownDefault: true,
                layout: {
                    'default': [
                        '1 2 3 4 5 6 7 8 9 0',
                        'Q W E R T Y U I O P',
                        'A S D F G H J K L',
                        'Z X C V B N M {backspace}',
                        '{clear} / : {space} {enter}'
                    ]
                },
                display: { '{backspace}': '⌫', '{enter}': 'ENTER', '{space}': ' ', '{clear}': 'CLR' }
            });

            document.querySelectorAll(".input").forEach(input => {
                input.addEventListener("focus", e => {
                    if (e.target.classList.contains('mask-date') || e.target.classList.contains('mask-time')) return;
                    if (e.target.type === 'number') return;
                    selectedInputName = e.target.name;
                    myKeyboard.setOptions({ inputName: e.target.name });
                    myKeyboard.setInput(e.target.value);
                    document.getElementById('keyboard-preview').innerText = e.target.value || "Typing...";
                    document.getElementById("keyboard-container").style.display = "block";
                });
            });

            document.addEventListener('input', function (e) {
                if (e.target.classList.contains('mask-date')) {
                    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,2})(\d{0,4})/);
                    e.target.value = !x[2] ? x[1] : x[1] + '/' + x[2] + (x[3] ? '/' + x[3] : '');
                }
                if (e.target.classList.contains('mask-time')) {
                    let x = e.target.value.replace(/\D/g, '').match(/(\d{0,2})(\d{0,2})/);
                    e.target.value = !x[2] ? x[1] : x[1] + ':' + x[2];
                }
            });
        }

        // --- VALIDATION ---
        function validateAndSubmit() {
            const taskType = document.getElementById('task-type').value;
            const title = document.querySelector('[name="title"]').value.trim();
            if (!title) { showError("TASK NAME is required."); return; }

            if (taskType === 'recurring') {
                const recurTime = document.querySelector('[name="recur_time"]').value;
                const recurStart = document.querySelector('[name="recur_start_date"]').value;
                if (!recurStart || !recurTime) { showError("Start Date and Time are required for recurring tasks."); return; }
            } else {
                const dlType = document.getElementById('deadline_type_val').value;
                if (!dlType) { showError("Select a DEADLINE TYPE first."); return; }
                if (dlType !== 'none') {
                    const date = document.querySelector('[name="deadline_date"]').value;
                    const time = document.querySelector('[name="deadline_time"]').value;
                    if (!date || !time) { showError("Date and Time are required for this deadline type."); return; }
                }
            }

            // Intercept for complex task breakdown
            if (document.getElementById('is_complex_val').value === '1' && taskType !== 'recurring') {
                startBreakdownFlow();
                return;
            }

            document.getElementById('task-form').submit();
        }

        // ── COMPLEX TASK BREAKDOWN FLOW ──────────────────────────────────────
        let _breakdownQuestions = [];
        let _breakdownAnswers = {};
        let _breakdownCurrentQ = 0;
        let _breakdownSubtasks = [];

        function startBreakdownFlow() {
            const title = document.querySelector('[name="title"]').value.trim();
            showBreakdownLoading('Getting questions...');
            fetch('/api/breakdown/questions', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title})
            })
            .then(r => r.json())
            .then(d => {
                _breakdownQuestions = d.questions || [];
                _breakdownAnswers = {};
                _breakdownCurrentQ = 0;
                hideBreakdownLoading();
                showNextQuestion();
            })
            .catch(() => { hideBreakdownLoading(); showError('Could not reach server. Check connection.'); });
        }

        const _bdOptionColors = [
            {bg:'#005500', color:'#00ff00', border:'#00ff00'},
            {bg:'#550000', color:'#ff4444', border:'#ff4444'},
            {bg:'#002255', color:'#4499ff', border:'#4499ff'},
            {bg:'#3a1a55', color:'#cc88ff', border:'#cc88ff'},
        ];

        function showNextQuestion() {
            if (_breakdownCurrentQ >= _breakdownQuestions.length) {
                submitBreakdownAnswers();
                return;
            }
            const q = _breakdownQuestions[_breakdownCurrentQ];
            const total = _breakdownQuestions.length;
            const num = _breakdownCurrentQ + 1;
            const questionText = typeof q === 'string' ? q : q.question;
            const options = (typeof q === 'object' && Array.isArray(q.options)) ? q.options : ['Yes', 'No'];

            document.getElementById('bd-question-text').innerText = questionText;
            document.getElementById('bd-progress').innerText = `Question ${num} of ${total}`;

            const container = document.getElementById('bd-options-container');
            container.innerHTML = '';
            // Use a row layout for 2 options, column for 3+
            container.style.flexDirection = options.length <= 2 ? 'row' : 'column';
            options.forEach((opt, i) => {
                const c = _bdOptionColors[i % _bdOptionColors.length];
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.style.cssText = `flex:1; padding:18px; font-size:1.1rem; font-weight:900;`
                    + `background:${c.bg}; color:${c.color}; border:3px solid ${c.border};`
                    + `border-radius:10px; cursor:pointer; text-align:center;`;
                btn.onclick = () => answerQuestion(opt);
                container.appendChild(btn);
            });

            document.getElementById('breakdown-question-modal').style.display = 'flex';
        }

        function answerQuestion(answer) {
            const q = _breakdownQuestions[_breakdownCurrentQ];
            const questionText = typeof q === 'string' ? q : q.question;
            _breakdownAnswers[_breakdownCurrentQ] = `${questionText}: ${answer}`;
            _breakdownCurrentQ++;
            document.getElementById('breakdown-question-modal').style.display = 'none';
            showNextQuestion();
        }

        function submitBreakdownAnswers() {
            const title = document.querySelector('[name="title"]').value.trim();
            const dlType = document.getElementById('deadline_type_val').value;
            let deadline = '';
            if (dlType !== 'none') {
                const date = document.querySelector('[name="deadline_date"]').value;
                const time = document.querySelector('[name="deadline_time"]').value;
                if (date && time) {
                    if (date.includes('/')) {
                        const [d, m, y] = date.split('/');
                        deadline = `${y}-${m}-${d}T${time}`;
                    } else {
                        deadline = `${date}T${time}`;
                    }
                }
            }
            showBreakdownLoading('AI is breaking down your task...');
            fetch('/api/breakdown/complete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({title, deadline, answers: _breakdownAnswers})
            })
            .then(r => r.json())
            .then(d => {
                hideBreakdownLoading();
                if (d.error) { showError('AI breakdown failed: ' + d.error); return; }
                _breakdownSubtasks = d.subtasks || [];
                showSubtasksPreview(_breakdownSubtasks, title, deadline);
            })
            .catch(() => { hideBreakdownLoading(); showError('Breakdown failed. Check AI connection in Settings.'); });
        }

        const _bdMonths = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

        function _fmtBdDate(deadline_date, deadline_time) {
            if (!deadline_date) return 'No deadline';
            const [y, m, d] = deadline_date.split('-');
            return `${parseInt(d)} ${_bdMonths[parseInt(m)-1]} ${deadline_time || '09:00'}`;
        }

        function showSubtasksPreview(subtasks, parentTitle, parentDeadline) {
            _breakdownSubtasks = subtasks;
            const list = document.getElementById('bd-subtasks-list');
            list.innerHTML = '';
            subtasks.forEach((s, i) => {
                const row = document.createElement('div');
                row.style.cssText = 'background:#1a1a1a; border:2px solid #444; border-radius:8px; padding:12px; margin-bottom:10px;';
                const dl = _fmtBdDate(s.deadline_date, s.deadline_time);
                const dur = s.duration_display || (s.duration_minutes + ' min');
                row.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:8px;">
                        <div style="flex:1; min-width:0;">
                            <div style="font-weight:900; color:white; font-size:1rem;">${i+1}. ${s.title}</div>
                            <div style="color:#aaa; font-size:0.85rem; margin-top:4px;">${dur} &nbsp;·&nbsp; ${dl}</div>
                        </div>
                        <div style="display:flex; gap:6px; flex-shrink:0;">
                            <button onclick="openBdEdit(${i})" style="padding:6px 10px; background:#002244; color:#4499ff; border:2px solid #4499ff; border-radius:6px; font-weight:900; font-size:0.75rem; cursor:pointer;">EDIT</button>
                            <button onclick="deleteBdTask(${i})" style="padding:6px 10px; background:#440000; color:#ff4444; border:2px solid #ff4444; border-radius:6px; font-weight:900; font-size:0.75rem; cursor:pointer;">✕</button>
                        </div>
                    </div>`;
                list.appendChild(row);
            });
            // Add task button
            const addBtn = document.createElement('button');
            addBtn.textContent = '+ ADD TASK';
            addBtn.style.cssText = 'width:100%; padding:10px; margin-top:4px; background:#111; color:#ffd700; border:2px dashed #ffd700; border-radius:8px; font-weight:900; font-size:0.9rem; cursor:pointer;';
            addBtn.onclick = () => openBdEdit(-1);
            list.appendChild(addBtn);

            document.getElementById('bd-parent-title').innerText = parentTitle;
            document.getElementById('breakdown-preview-modal').style.display = 'flex';
            document.getElementById('breakdown-preview-modal').dataset.parentTitle = parentTitle;
            document.getElementById('breakdown-preview-modal').dataset.parentDeadline = parentDeadline;
        }

        // ── BREAKDOWN TASK EDIT ───────────────────────────────────────────────
        let _bdEditIndex = null;

        function openBdEdit(idx) {
            _bdEditIndex = idx;
            const s = idx >= 0 ? _breakdownSubtasks[idx] : {title:'', deadline_date:'', deadline_time:'09:00', duration_minutes:30};
            document.getElementById('bde-title').value = s.title || '';
            document.getElementById('bde-time').value = s.deadline_time || '09:00';
            document.getElementById('bde-duration').value = s.duration_minutes || 30;
            if (s.deadline_date) {
                const [y, m, d] = s.deadline_date.split('-');
                document.getElementById('bde-date').value = `${d.padStart(2,'0')}/${m.padStart(2,'0')}/${y}`;
            } else {
                document.getElementById('bde-date').value = '';
            }
            document.getElementById('bd-edit-modal').style.display = 'flex';
        }

        function closeBdEdit() {
            document.getElementById('bd-edit-modal').style.display = 'none';
        }

        function saveBdEdit() {
            const title = document.getElementById('bde-title').value.trim();
            if (!title) return;
            const dateVal = document.getElementById('bde-date').value.trim();
            const timeVal = document.getElementById('bde-time').value || '09:00';
            const duration = parseInt(document.getElementById('bde-duration').value) || 30;
            let deadline_date = '';
            if (dateVal) {
                if (dateVal.includes('/')) {
                    const [d, m, y] = dateVal.split('/');
                    deadline_date = `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
                } else {
                    deadline_date = dateVal;
                }
            }
            const dur_h = Math.floor(duration / 60), dur_m = duration % 60;
            const duration_display = dur_h > 0 ? (dur_m > 0 ? `${dur_h}h ${dur_m}m` : `${dur_h}h`) : `${duration} MIN`;
            const task = {title, deadline_date, deadline_time: timeVal, duration_minutes: duration, duration_display};
            if (_bdEditIndex >= 0) {
                _breakdownSubtasks[_bdEditIndex] = task;
            } else {
                _breakdownSubtasks.push(task);
            }
            closeBdEdit();
            const modal = document.getElementById('breakdown-preview-modal');
            showSubtasksPreview(_breakdownSubtasks, modal.dataset.parentTitle, modal.dataset.parentDeadline);
        }

        function deleteBdTask(idx) {
            _breakdownSubtasks.splice(idx, 1);
            const modal = document.getElementById('breakdown-preview-modal');
            showSubtasksPreview(_breakdownSubtasks, modal.dataset.parentTitle, modal.dataset.parentDeadline);
        }

        function confirmBreakdown() {
            const modal = document.getElementById('breakdown-preview-modal');
            const parentTitle = modal.dataset.parentTitle;
            const parentDeadline = modal.dataset.parentDeadline;
            modal.style.display = 'none';
            showBreakdownLoading('Saving tasks...');
            fetch('/api/breakdown/commit', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({parent_title: parentTitle, parent_deadline: parentDeadline, subtasks: _breakdownSubtasks})
            })
            .then(r => r.json())
            .then(d => {
                hideBreakdownLoading();
                if (d.status === 'ok') { window.location.href = '/'; }
                else { showError('Failed to save tasks.'); }
            })
            .catch(() => { hideBreakdownLoading(); showError('Save failed. Check connection.'); });
        }

        function cancelBreakdown() {
            document.getElementById('breakdown-question-modal').style.display = 'none';
            document.getElementById('breakdown-preview-modal').style.display = 'none';
            hideBreakdownLoading();
        }

        function showBreakdownLoading(msg) {
            document.getElementById('bd-loading-msg').innerText = msg || 'Working...';
            document.getElementById('breakdown-loading-modal').style.display = 'flex';
        }
        function hideBreakdownLoading() {
            document.getElementById('breakdown-loading-modal').style.display = 'none';
        }

        function showError(msg) {
            document.getElementById('error-message').innerText = msg;
            document.getElementById('error-popup').style.display = 'flex';
        }

        // --- NUMPAD ---
        let _npActiveInput = null;
        let _npBuffer = '';

        function openNumpad(inputEl) {
            _npActiveInput = inputEl;
            _npBuffer = String(inputEl.value || '');
            document.getElementById('numpad-display').innerText = _npBuffer || '--';
            document.getElementById('numpad-popup').style.display = 'flex';
        }

        function npType(val) {
            _npBuffer += val;
            document.getElementById('numpad-display').innerText = _npBuffer;
        }

        function npBackspace() {
            _npBuffer = _npBuffer.slice(0, -1);
            document.getElementById('numpad-display').innerText = _npBuffer || '--';
        }

        function npClear() {
            _npBuffer = '';
            document.getElementById('numpad-display').innerText = '--';
        }

        function npClose() {
            if (_npActiveInput && _npBuffer !== '') {
                const num = parseInt(_npBuffer, 10);
                if (!isNaN(num)) _npActiveInput.value = num;
            }
            document.getElementById('numpad-popup').style.display = 'none';
            _npActiveInput = null;
            _npBuffer = '';
        }

        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('click', e => openNumpad(e.target));
        });
    </script>

    <!-- ERROR POPUP -->
    <div id="error-popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:#111; border:5px solid #ff0055; border-radius:20px; padding:30px; width:90%; max-width:400px; box-sizing:border-box; text-align:center;">
            <h2 style="color:#ff0055; margin-top:0; font-size:2rem; text-transform:uppercase;">ERROR</h2>
            <div id="error-message" style="font-size:1.5rem; font-weight:900; color:white; margin-bottom:20px;">Please fill in all fields.</div>
            <button onclick="document.getElementById('error-popup').style.display='none'" style="width:100%; padding:15px; font-size:1.5rem; font-weight:900; background:#ff0055; color:white; border-radius:10px; border:2px solid white; cursor:pointer;">OK</button>
        </div>
    </div>

    <!-- NUMPAD POPUP -->
    <div id="numpad-popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:#111; border:5px solid #ffd700; border-radius:20px; padding:30px; width:90%; max-width:400px; box-sizing:border-box;">
            <h2 id="numpad-title" style="text-align:center; color:#ffd700; margin-top:0; font-size:2rem; text-transform:uppercase;">DURATION (MINS)</h2>
            <div id="numpad-display" style="background:#222; border:3px solid white; padding:15px; font-size:2.5rem; text-align:center; font-weight:900; margin-bottom:20px; border-radius:10px;">--</div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;">
                <button class="p-btn" onclick="npType('1')">1</button>
                <button class="p-btn" onclick="npType('2')">2</button>
                <button class="p-btn" onclick="npType('3')">3</button>
                <button class="p-btn" onclick="npType('4')">4</button>
                <button class="p-btn" onclick="npType('5')">5</button>
                <button class="p-btn" onclick="npType('6')">6</button>
                <button class="p-btn" onclick="npType('7')">7</button>
                <button class="p-btn" onclick="npType('8')">8</button>
                <button class="p-btn" onclick="npType('9')">9</button>
                <button class="p-btn" onclick="npBackspace()" style="background:#ff0055; color:white; border-color:#ff0055;">⌫</button>
                <button class="p-btn" onclick="npType('0')">0</button>
                <button class="p-btn" onclick="npClear()" style="background:#333; color:#aaa; border-color:#555;">CLR</button>
                <button class="p-btn" onclick="npClose()" style="background:#00ff00; color:black; border-color:#00ff00; grid-column: span 3; margin-top:10px; height: 70px; font-size: 2rem;">OK</button>
            </div>
        </div>
    </div>

    <!-- BREAKDOWN: LOADING -->
    <!-- BREAKDOWN: TASK EDIT -->
    <div id="bd-edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.97); z-index:3100; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:#111; border:5px solid #4499ff; border-radius:20px; padding:28px; width:92%; max-width:480px; box-sizing:border-box;">
            <h2 style="color:#4499ff; margin:0 0 20px 0; font-size:1.2rem; text-transform:uppercase;">Edit Task</h2>
            <label style="color:#aaa; font-size:0.8rem; font-weight:900; display:block; margin-bottom:4px;">TITLE</label>
            <input id="bde-title" type="text" style="width:100%; padding:12px; background:#1a1a1a; color:white; border:2px solid #444; border-radius:8px; font-size:1rem; font-weight:700; box-sizing:border-box; margin-bottom:14px;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:14px;">
                <div>
                    <label style="color:#aaa; font-size:0.8rem; font-weight:900; display:block; margin-bottom:4px;">DATE</label>
                    <input id="bde-date" type="text" placeholder="DD/MM/YYYY" readonly
                           style="width:100%; padding:12px; background:#1a1a1a; color:white; border:2px solid #444; border-radius:8px; font-size:0.95rem; font-weight:700; box-sizing:border-box; cursor:pointer;"
                           onclick="if(!isMobile){openPicker(this)}else{this.removeAttribute('readonly');this.type='text';}">
                </div>
                <div>
                    <label style="color:#aaa; font-size:0.8rem; font-weight:900; display:block; margin-bottom:4px;">TIME</label>
                    <input id="bde-time" type="text" placeholder="HH:MM" readonly
                           style="width:100%; padding:12px; background:#1a1a1a; color:white; border:2px solid #444; border-radius:8px; font-size:0.95rem; font-weight:700; box-sizing:border-box; cursor:pointer;"
                           onclick="if(!isMobile){openClockPicker(this)}else{this.removeAttribute('readonly');this.type='time';}">
                </div>
            </div>
            <label style="color:#aaa; font-size:0.8rem; font-weight:900; display:block; margin-bottom:4px;">DURATION (MINUTES)</label>
            <input id="bde-duration" type="number" min="5" max="480" step="5"
                   style="width:100%; padding:12px; background:#1a1a1a; color:white; border:2px solid #444; border-radius:8px; font-size:1rem; font-weight:700; box-sizing:border-box; margin-bottom:20px; cursor:pointer;"
                   onclick="openNumpad(this)">
            <div style="display:flex; gap:12px;">
                <button onclick="saveBdEdit()" style="flex:2; padding:16px; font-size:1.1rem; font-weight:900; background:#002244; color:#4499ff; border:3px solid #4499ff; border-radius:10px; cursor:pointer;">SAVE</button>
                <button onclick="closeBdEdit()" style="flex:1; padding:16px; font-size:1rem; font-weight:900; background:#333; color:#aaa; border:2px solid #555; border-radius:10px; cursor:pointer;">CANCEL</button>
            </div>
        </div>
    </div>

    <div id="breakdown-loading-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:3000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="font-size:3rem; margin-bottom:20px;">🤖</div>
        <div id="bd-loading-msg" style="color:#ffd700; font-size:1.4rem; font-weight:900; text-align:center;">Working...</div>
    </div>

    <!-- BREAKDOWN: QUESTION -->
    <div id="breakdown-question-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:3000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:#111; border:5px solid #ff8800; border-radius:20px; padding:30px; width:92%; max-width:500px; box-sizing:border-box;">
            <div id="bd-progress" style="color:#ff8800; font-size:0.9rem; font-weight:900; margin-bottom:12px; text-transform:uppercase; letter-spacing:1px;">Question 1 of 5</div>
            <h2 style="color:#ffd700; margin:0 0 24px 0; font-size:1.3rem; line-height:1.4;">AI TASK BREAKDOWN</h2>
            <div id="bd-question-text" style="color:white; font-size:1.2rem; font-weight:700; margin-bottom:30px; line-height:1.5;"></div>
            <div id="bd-options-container" style="display:flex; flex-direction:column; gap:12px; margin-bottom:16px;"></div>
            <button onclick="cancelBreakdown()" style="width:100%; padding:12px; font-size:1rem; font-weight:900; background:#333; color:#aaa; border:2px solid #555; border-radius:10px; cursor:pointer;">CANCEL BREAKDOWN</button>
        </div>
    </div>

    <!-- BREAKDOWN: SUBTASKS PREVIEW -->
    <div id="breakdown-preview-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:3000; justify-content:center; align-items:center; flex-direction:column; overflow-y:auto;">
        <div style="background:#111; border:5px solid #00ff00; border-radius:20px; padding:24px; width:92%; max-width:560px; box-sizing:border-box; margin:20px auto;">
            <h2 style="color:#00ff00; margin:0 0 6px 0; font-size:1.4rem; text-transform:uppercase;">AI BREAKDOWN READY</h2>
            <div id="bd-parent-title" style="color:#aaa; font-size:0.9rem; margin-bottom:18px; font-style:italic;"></div>
            <div id="bd-subtasks-list"></div>
            <div style="display:flex; gap:12px; margin-top:16px;">
                <button onclick="confirmBreakdown()" style="flex:2; padding:18px; font-size:1.2rem; font-weight:900; background:#005500; color:#00ff00; border:3px solid #00ff00; border-radius:10px; cursor:pointer;">SAVE THESE TASKS</button>
                <button onclick="cancelBreakdown()" style="flex:1; padding:18px; font-size:1rem; font-weight:900; background:#333; color:#aaa; border:2px solid #555; border-radius:10px; cursor:pointer;">CANCEL</button>
            </div>
        </div>
    </div>
</body>
</html>
