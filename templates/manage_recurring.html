<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Recurring</title>
    <style>
        body { 
            background: #121212; 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden; 
        }

        /* --- FIXED HEADER --- */
        header {
            background: #000;
            padding: 25px;
            border-bottom: 5px solid white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        h2 { margin: 0; font-size: 2.5rem; text-transform: uppercase; color: #ffd700; }

        .btn-back { 
            background: #444; 
            color: white !important; 
            border: 5px solid white; 
            padding: 20px 40px; 
            border-radius: 15px; 
            text-decoration: none; 
            font-size: 1.8rem; 
            font-weight: 900;
            text-transform: uppercase;
        }

        /* --- THE CUSTOM CHUNKY SCROLLBAR --- */
        #main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        #scroll-area {
            flex: 1;
            overflow-y: scroll;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center; /* Re-centered the cards */
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        #scroll-area::-webkit-scrollbar { display: none; } /* Hide the shit browser scrollbar */

        /* Our Custom Side-Bar */
        #custom-scrollbar {
            width: 120px; /* Massive hit zone */
            background: #1a1a1a;
            border-left: 5px solid white;
            position: relative;
            cursor: pointer;
        }

        #scroll-thumb {
            width: 100%;
            height: 150px;
            background: #ffd700;
            border-bottom: 5px solid white;
            border-top: 5px solid white;
            position: absolute;
            top: 0;
        }

        /* --- TEMPLATE CARDS --- */
        .template-card { 
            background: #222; 
            border: 5px solid white; 
            padding: 30px; 
            margin-bottom: 25px; 
            border-radius: 20px;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            width: 90%;
            max-width: 800px;
        }

        .info-box strong { font-size: 2.5rem; text-transform: uppercase; display: block; margin-bottom: 10px; }
        .info-box small { font-size: 1.8rem; color: #ffd700; font-weight: bold; text-transform: uppercase; }

        .btn-delete { 
            background: #900; 
            color: white; 
            border: 5px solid white; 
            padding: 25px 50px; 
            border-radius: 15px; 
            cursor: pointer; 
            font-size: 1.8rem;
            font-weight: 900;
        }
    </style>
</head>
<body>
    <header>
        <h2>RECURRING LIST</h2>
        <a href="/add" class="btn-back">⬅ BACK</a>
    </header>

    <div id="main-container">
        <div id="scroll-area">
            {% for t in templates %}
            <div class="template-card">
                <div class="info-box">
                    <strong>{{ t.title }}</strong>
                    <small>{{ t.display }}</small>
                </div>
                    <form action="/delete_template/{{ t.id }}" method="POST">
                        <button type="submit" class="btn-delete">DELETE</button>
                    </form>
            </div>
            {% endfor %}
        </div>

        <div id="custom-scrollbar" onmousedown="startScroll(event)" ontouchstart="startScroll(event)">
            <div id="scroll-thumb"></div>
        </div>
    </div>

    <script>
        const scrollArea = document.getElementById('scroll-area');
        const thumb = document.getElementById('scroll-thumb');
        const track = document.getElementById('custom-scrollbar');

        scrollArea.addEventListener('scroll', () => {
            const scrollPercent = scrollArea.scrollTop / (scrollArea.scrollHeight - scrollArea.clientHeight);
            const thumbPos = scrollPercent * (track.clientHeight - thumb.clientHeight);
            thumb.style.top = thumbPos + 'px';
        });

        function startScroll(e) {
            const moveHandler = (moveEvent) => {
                const y = (moveEvent.touches ? moveEvent.touches[0].clientY : moveEvent.clientY) - track.getBoundingClientRect().top;
                const percent = Math.max(0, Math.min(1, y / track.clientHeight));
                scrollArea.scrollTop = percent * (scrollArea.scrollHeight - scrollArea.clientHeight);
            };
            const stopHandler = () => {
                window.removeEventListener('mousemove', moveHandler);
                window.removeEventListener('mouseup', stopHandler);
                window.removeEventListener('touchmove', moveHandler);
                window.removeEventListener('touchend', stopHandler);
            };
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('mouseup', stopHandler);
            window.addEventListener('touchmove', moveHandler, { passive: false });
            window.addEventListener('touchend', stopHandler);
        }
    </script>
</body>
</html>
