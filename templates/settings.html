<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Settings</title>
    <link rel="stylesheet" href="/static/js/simple-keyboard.css">
    <style>
        body { 
            background: #121212; color: white; font-family: sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column;
            height: 100vh; overflow: hidden; 
        }

        /* --- STREAMLINED COMMAND HEADER --- */
        header {
            background: #000; padding: 5px 10px; border-bottom: 3px solid white;
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }

        h2 { margin: 0; font-size: 1.6rem; text-transform: uppercase; color: #ffd700; }

        .header-btns { display: flex; gap: 10px; }

        .btn-header { 
            padding: 8px 12px; border: 2px solid white; border-radius: 8px; 
            font-weight: 900; font-size: 0.95rem; text-decoration: none; text-transform: uppercase;
            cursor: pointer; display: flex; align-items: center;
        }
        .btn-save { background: #00ff00; color: black; }
        .btn-cancel { background: #444; color: white; }

        /* --- MAIN LAYOUT --- */
        #main-container { display: flex; flex: 1; overflow: hidden; }

        #scroll-area {
            flex: 1; overflow-y: scroll; padding: 5px;
            scrollbar-width: none; -ms-overflow-style: none;
        }
        #scroll-area::-webkit-scrollbar { display: none; }

        /* Chunky Scrollbar */
        #custom-scrollbar {
            width: 70px; background: #1a1a1a; border-left: 3px solid white; 
            position: relative; cursor: pointer;
        }
        #scroll-thumb {
            width: 100%; height: 90px; background: #ffd700;
            border-bottom: 3px solid white; border-top: 3px solid white;
            position: absolute; top: 0;
        }

        form { width: 100%; max-width: 800px; margin: 0 auto; padding-bottom: 50px; }
        label { font-size: 0.9rem; font-weight: bold; color: #ffd700; display: block; margin-top: 5px; text-transform: uppercase; }
        
        input { 
            width: 100%; padding: 8px; margin: 3px 0; background: #222; 
            color: white; border: 2px solid white; font-size: 1.25rem; 
            font-weight: 900; border-radius: 8px; box-sizing: border-box;
        }

        .side-by-side { display: flex; gap: 10px; width: 100%; }
        .side-by-side div { flex: 1; }

        /* Day Selector */
        .day-selector { display: flex; gap: 8px; margin-top: 15px; }
        .day-selector input { display: none; }
        .day-selector label { 
            flex: 1; padding: 5px 2px; background: #333; 
            border: 2px solid white; border-radius: 8px; text-align: center; 
            cursor: pointer; font-size: 0.9rem; color: white; margin-top: 0;
            font-weight: 900;
        }
        .day-selector input:checked + label { background: #0066ff; border-color: #ffd700; }

        /* FAT FINGER PICKERS */
        .p-btn { 
            background: #222; color: white; border: 3px solid white; 
            font-size: 1.0rem; font-weight: 900; padding: 10px; 
            border-radius: 8px; cursor: pointer; 
            display: flex; justify-content: center; align-items: center;
        }
        .p-btn:active, .p-btn.active { background: #ffd700; color: black; border-color: #ffd700; }

    </style>
</head>
<body>
    <header>
        <h2>BOARD SETTINGS</h2>
        <div class="header-btns">
            <button type="button" class="btn-header btn-save" onclick="validateAndSubmitSettings()">💾 SAVE</button>
            <a href="/" class="btn-header btn-cancel">❌ CANCEL</a>
        </div>
    </header>

    <div id="main-container">
        <div id="scroll-area">
            <form id="settings-form" method="POST" autocomplete="off">
                <label>MORNING BRIEFING TIME (HH:MM):</label>
                <input type="text" name="briefing_time" class="input mask-time" placeholder="08:00" value="{{ settings.briefing_time }}" maxlength="5">

                <label>BRIEFING DAYS:</label>
                <div class="day-selector">
                    {% for day in ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'] %}
                    <input type="checkbox" name="briefing_days" id="day-{{ day }}" value="{{ day }}" 
                           {% if day in settings.briefing_days %}checked{% endif %}>
                    <label for="day-{{ day }}">{{ day|upper }}</label>
                    {% endfor %}
                </div>

                <div class="side-by-side">
                    <div>
                        <label>DND START (HH:MM):</label>
                        <input type="text" name="dnd_start" class="input mask-time" placeholder="22:00" value="{{ settings.dnd_start }}" maxlength="5">
                    </div>
                    <div>
                        <label>DND END (HH:MM):</label>
                        <input type="text" name="dnd_end" class="input mask-time" placeholder="07:00" value="{{ settings.dnd_end }}" maxlength="5">
                    </div>
                </div>

                <div class="side-by-side">
                    <div>
                        <label>PROGRESS BAR SCALE (HOURS):</label>
                        <input type="number" name="bar_start_hours" step="0.1" class="input" value="{{ settings.bar_start_hours }}">
                    </div>
                    <div>
                        <label>OVERDUE NAG INTERVAL (MINS):</label>
                        <input type="number" name="nag_interval" class="input" value="{{ settings.nag_interval }}">
                    </div>
                </div>

                <div class="side-by-side" style="align-items: flex-end; margin-top: 5px;">
                    <div style="flex: 1;">
                        <label>SERVER PORT:</label>
                        <input type="number" name="port" class="input" value="{{ settings.port or '5001' }}">
                    </div>
                    <div style="flex: 2; display: flex; gap: 5px; padding-bottom: 5px;">
                        <button type="button" class="p-btn screen-btn active" onclick="setScreenSize('small', this)">SMALL SCREEN</button>
                        <button type="button" class="p-btn screen-btn" onclick="setScreenSize('medium', this)">MEDIUM SCREEN</button>
                        <button type="button" class="p-btn screen-btn" onclick="setScreenSize('large', this)">LARGE SCREEN</button>
                    </div>
                </div>
            </form>
        </div>

        <div id="custom-scrollbar" onmousedown="startScroll(event)" ontouchstart="startScroll(event)">
            <div id="scroll-thumb"></div>
        </div>
    </div>

    <!-- --- TOUCH NUMPAD PICKER --- -->
    <div id="touch-picker" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:#111; border:5px solid #ffd700; border-radius:20px; padding:30px; width:90%; max-width:400px; box-sizing:border-box;">
            <h2 id="picker-title" style="text-align:center; color:#ffd700; margin-top:0; font-size:2rem; text-transform:uppercase;">ENTER NUMBER</h2>
            <div id="picker-display" style="background:#222; border:3px solid white; padding:15px; font-size:2.5rem; text-align:center; font-weight:900; margin-bottom:20px; border-radius:10px;">--</div>
            <div style="display:grid; grid-template-columns: repeat(3, 1fr); gap:15px;">
                <button class="p-btn" onclick="pType('1')">1</button>
                <button class="p-btn" onclick="pType('2')">2</button>
                <button class="p-btn" onclick="pType('3')">3</button>
                <button class="p-btn" onclick="pType('4')">4</button>
                <button class="p-btn" onclick="pType('5')">5</button>
                <button class="p-btn" onclick="pType('6')">6</button>
                <button class="p-btn" onclick="pType('7')">7</button>
                <button class="p-btn" onclick="pType('8')">8</button>
                <button class="p-btn" onclick="pType('9')">9</button>
                <button class="p-btn" onclick="pClear()" style="background:#ff0055; color:white;">CLR</button>
                <button class="p-btn" onclick="pType('0')">0</button>
                <button class="p-btn" onclick="pType('.')">.</button>
                <button class="p-btn" onclick="pClose()" style="background:#00ff00; color:black; grid-column: span 3; margin-top:10px; height: 70px; font-size: 2rem;">OK</button>
            </div>
        </div>
    </div>

    <!-- --- TOUCH CLOCK PICKER --- -->
    <div id="clock-picker" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:#111; border:5px solid #ffd700; border-radius:20px; padding:20px; width:90%; max-width:300px; box-sizing:border-box; text-align:center;">
            <h2 style="color:#ffd700; margin-top:0; font-size:2rem;">SELECT TIME</h2>
            <div id="clock-digital" style="background:#222; border:3px solid white; padding:10px; font-size:1.8rem; font-weight:900; margin-bottom:15px; border-radius:10px; color:white; display:inline-block; width:120px;">12:00</div>
            <div id="clock-face" style="width:240px; height:240px; border:6px solid white; border-radius:50%; margin:0 auto; position:relative; background:#1a1a1a; touch-action:none;">
                <div style="width:16px; height:16px; background:white; border-radius:50%; position:absolute; top:112px; left:112px; z-index:10;"></div>
                <div id="hour-hand" style="width:18px; height:60px; background:#ffd700; position:absolute; top:52px; left:111px; transform-origin: bottom center; transform: rotate(0deg); border-radius: 8px; z-index: 5;"></div>
                <div id="minute-hand" style="width:16px; height:90px; background:#00ff00; position:absolute; top:22px; left:112px; transform-origin: bottom center; transform: rotate(0deg); border-radius: 4px; z-index: 4;"></div>
            </div>
            
            <div style="display:flex; justify-content:center; gap:20px; margin-top:15px;">
                <button type="button" id="toggle-am" class="p-btn active" onclick="setAMPM('AM')">AM</button>
                <button type="button" id="toggle-pm" class="p-btn" onclick="setAMPM('PM')">PM</button>
            </div>
            
            <div style="display:flex; justify-content:space-between; margin-top:20px; gap:10px;">
                <button onclick="closeClock()" style="flex:1; padding:15px; font-size:1.2rem; font-weight:900; background:#444; color:white; border-radius:10px; border:2px solid #555; cursor:pointer;">CANCEL</button>
                <button onclick="confirmTime()" style="flex:1; padding:15px; font-size:1.2rem; font-weight:900; background:#00ff00; color:black; border-radius:10px; border:2px solid white; cursor:pointer;">OK</button>
            </div>
        </div>
    </div>

    <script>
        // Chunky Scrollbar Logic
        const scrollArea = document.getElementById('scroll-area');
        const thumb = document.getElementById('scroll-thumb');
        const track = document.getElementById('custom-scrollbar');

        scrollArea.addEventListener('scroll', () => {
            const scrollPercent = scrollArea.scrollTop / (scrollArea.scrollHeight - scrollArea.clientHeight);
            const thumbPos = scrollPercent * (track.clientHeight - thumb.clientHeight);
            thumb.style.top = thumbPos + 'px';
        });

        function startScroll(e) {
            const moveHandler = (moveEvent) => {
                const y = (moveEvent.touches ? moveEvent.touches[0].clientY : moveEvent.clientY) - track.getBoundingClientRect().top;
                const percent = Math.max(0, Math.min(1, y / track.clientHeight));
                scrollArea.scrollTop = percent * (scrollArea.scrollHeight - scrollArea.clientHeight);
            };
            const stopHandler = () => {
                window.removeEventListener('mousemove', moveHandler);
                window.removeEventListener('mouseup', stopHandler);
                window.removeEventListener('touchmove', moveHandler);
                window.removeEventListener('touchend', stopHandler);
            };
            window.addEventListener('mousemove', moveHandler);
            window.addEventListener('mouseup', stopHandler);
            window.addEventListener('touchmove', moveHandler, { passive: false });
            window.addEventListener('touchend', stopHandler);
        }

        function setScreenSize(size, btn) {
            document.querySelectorAll('.screen-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        // --- NUMPAD PICKER LOGIC ---
        let activeNumpadInput = null;

        function openNumpad(inputEl) {
            activeNumpadInput = inputEl;
            document.getElementById('picker-display').innerText = inputEl.value || "--";
            document.getElementById('touch-picker').style.display = 'flex';
        }

        function pType(val) {
            if (!activeNumpadInput) return;
            activeNumpadInput.value += val;
            activeNumpadInput.dispatchEvent(new Event('input', { bubbles: true }));
            document.getElementById('picker-display').innerText = activeNumpadInput.value;
        }

        function pClear() {
            if (!activeNumpadInput) return;
            activeNumpadInput.value = "";
            document.getElementById('picker-display').innerText = "--";
        }

        function pClose() {
            document.getElementById('touch-picker').style.display = 'none';
            activeNumpadInput = null;
        }

        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('click', e => {
                openNumpad(e.target);
            });
        });

        // --- CLOCK PICKER LOGIC ---
        let activeClockInput = null;
        let currentHour = 12;
        let currentMinute = 0;
        let activeHand = null;
        let currentAMPM = 'AM';

        function setAMPM(val) {
            currentAMPM = val;
            document.getElementById('toggle-am').classList.toggle('active', val === 'AM');
            document.getElementById('toggle-pm').classList.toggle('active', val === 'PM');
            updateClockDisplay();
        }

        const face = document.getElementById('clock-face');
        for (let i = 1; i <= 12; i++) {
            const num = document.createElement('div');
            num.innerText = i;
            num.style.position = 'absolute';
            num.style.color = 'white';
            num.style.fontWeight = '900';
            num.style.fontSize = '1.4rem';
            const angle = i * 30 * (Math.PI / 180);
            const radius = 90;
            const x = 120 + radius * Math.sin(angle) - 10;
            const y = 120 - radius * Math.cos(angle) - 15;
            num.style.left = `${x}px`;
            num.style.top = `${y}px`;
            face.appendChild(num);
        }

        function openClockPicker(inputEl) {
            activeClockInput = inputEl;
            document.getElementById('clock-picker').style.display = 'flex';
            updateClockDisplay();
        }

        function closeClock() {
            document.getElementById('clock-picker').style.display = 'none';
            activeHand = null;
        }

        function confirmTime() {
            if (!activeClockInput) return;
            let displayHour = currentHour;
            if (currentAMPM === 'PM' && currentHour < 12) {
                displayHour += 12;
            } else if (currentAMPM === 'AM' && currentHour === 12) {
                displayHour = 0;
            }
            const hStr = String(displayHour).padStart(2, '0');
            const mStr = String(currentMinute).padStart(2, '0');
            activeClockInput.value = `${hStr}:${mStr}`;
            activeClockInput.dispatchEvent(new Event('input', { bubbles: true }));
            closeClock();
        }

        function updateClockDisplay() {
            let displayHour = currentHour;
            if (currentAMPM === 'PM' && currentHour < 12) {
                displayHour += 12;
            } else if (currentAMPM === 'AM' && currentHour === 12) {
                displayHour = 0;
            }
            
            document.getElementById('clock-digital').innerText = `${String(displayHour).padStart(2, '0')}:${String(currentMinute).padStart(2, '0')}`;
            const hDeg = (currentHour % 12) * 30;
            const mDeg = currentMinute * 6;
            document.getElementById('hour-hand').style.transform = `rotate(${hDeg}deg)`;
            document.getElementById('minute-hand').style.transform = `rotate(${mDeg}deg)`;
        }

        function handleClockMove(e) {
            if (!activeHand) return;
            const rect = face.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - centerX;
            const y = clientY - centerY;
            let angle = Math.atan2(y, x) * (180 / Math.PI) + 90;
            if (angle < 0) angle += 360;
            
            if (activeHand === 'hour') {
                let hour = Math.round(angle / 30);
                if (hour === 0) hour = 12;
                if (hour > 12) hour = 12;
                currentHour = hour;
            } else if (activeHand === 'minute') {
                let min = Math.round(angle / 6);
                min = Math.round(min / 5) * 5;
                if (min === 60) min = 0;
                currentMinute = min;
            }
            updateClockDisplay();
        }

        function startClockDrag(e) {
            const rect = face.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            const x = clientX - centerX;
            const y = clientY - centerY;
            const dist = Math.sqrt(x*x + y*y);
            if (dist < 75) { activeHand = 'hour'; } else { activeHand = 'minute'; }
            handleClockMove(e);
        }

        face.addEventListener('mousedown', (e) => { startClockDrag(e); });
        face.addEventListener('touchstart', (e) => { e.preventDefault(); startClockDrag(e); }, { passive: false });
        window.addEventListener('mousemove', handleClockMove);
        window.addEventListener('touchmove', handleClockMove, { passive: false });
        window.addEventListener('mouseup', () => activeHand = null);
        window.addEventListener('touchend', () => activeHand = null);

        document.querySelectorAll('.mask-time').forEach(input => {
            input.addEventListener('click', e => {
                openClockPicker(e.target);
            });
        });


        function validateAndSubmitSettings() {
            const fields = ['briefing_time', 'dnd_start', 'dnd_end', 'bar_start_hours', 'nag_interval', 'port'];
            for (const field of fields) {
                const el = document.querySelector(`[name="${field}"]`);
                if (el && !el.value.trim()) {
                    showError(`Field '${field.replace('_', ' ').toUpperCase()}' is compulsory.`);
                    return;
                }
            }
            
            // Check checkboxes
            const checkboxes = document.querySelectorAll('input[name="briefing_days"]:checked');
            if (checkboxes.length === 0) {
                showError("At least one BRIEFING DAY must be selected.");
                return;
            }
            
            document.getElementById('settings-form').submit();
        }

        function showError(msg) {
            document.getElementById('error-message').innerText = msg;
            document.getElementById('error-popup').style.display = 'flex';
        }
    </script>

    <!-- --- ERROR POPUP --- -->
    <div id="error-popup" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:2000; justify-content:center; align-items:center; flex-direction:column;">
        <div style="background:#111; border:5px solid #ff0055; border-radius:20px; padding:30px; width:90%; max-width:400px; box-sizing:border-box; text-align:center;">
            <h2 style="color:#ff0055; margin-top:0; font-size:2rem; text-transform:uppercase;">ERROR</h2>
            <div id="error-message" style="font-size:1.5rem; font-weight:900; color:white; margin-bottom:20px;">Please fill in all fields.</div>
            <button onclick="document.getElementById('error-popup').style.display='none'" style="width:100%; padding:15px; font-size:1.5rem; font-weight:900; background:#ff0055; color:white; border-radius:10px; border:2px solid white; cursor:pointer;">OK</button>
        </div>
    </div>
</body>
</html>
